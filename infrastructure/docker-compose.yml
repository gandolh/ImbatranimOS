# ImbatranimOS compose. Build context is the repo root (..) because the
# image needs the whole apps/ tree (split dependency layout).
#
#   Prod (the friend-run experience):
#     docker compose -f infrastructure/docker-compose.yml up imbatranimos
#   Dev (HMR):
#     docker compose -f infrastructure/docker-compose.yml --profile dev up
services:
  # Slim single-container product: desktop + API + (future) WS on one port.
  imbatranimos:
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
      target: prod
    image: imbatranimos:1.0
    ports:
      - "8080:8080"
    volumes:
      - imbatranim-home:/home/imbatranim
    restart: unless-stopped
    # Auth defaults are plain-HTTP-safe (LAN/localhost works as-is). When a
    # TLS reverse proxy (see Caddyfile.example / README.md) fronts this, enable
    # secure cookies and proxy trust so the session cookie sticks over HTTPS
    # and login rate-limiting keys on the real client IP:
    # environment:
    #   - COOKIE_SECURE=true
    #   - TRUST_PROXY=true
    #   - SESSION_TTL_HOURS=168

  # Development: Nest watch + Vite HMR, source bind-mounted, two ports.
  # node_modules are kept from the image via anonymous volumes so the host
  # mount doesn't shadow the container's installed deps.
  dev:
    profiles: ["dev"]
    build:
      context: ..
      dockerfile: infrastructure/Dockerfile
      target: dev
    ports:
      - "3001:3001"
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3001/api
    volumes:
      - ../apps:/app/apps
      - /app/apps/node_modules
      - /app/apps/backend/node_modules
      - /app/apps/frontend/node_modules
      - imbatranim-home-dev:/home/imbatranim

volumes:
  imbatranim-home:
  imbatranim-home-dev:
